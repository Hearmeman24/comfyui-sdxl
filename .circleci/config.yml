# .circleci/config.yml  (CircleCI 2.1)
version: 2.1

executors:
  docker-dind:
    # machine executor gives you full Docker daemon + BuildKit
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: true
    environment:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1

commands:
  notify-flowbot:
    description: Send a webhook notification to FlowBot
    parameters:
      message:
        type: string
    steps:
      - run:
          name: Notify FlowBot
          when: always
          command: |
            if [ -z "$FLOWBOT_WEBHOOK_URL" ] || [ -z "$FLOWBOT_WEBHOOK_TOKEN" ]; then
              echo "Missing webhook env vars, skipping notification."
              exit 0
            fi
            curl -s -X POST "${FLOWBOT_WEBHOOK_URL}/hooks/agent" \
              -H "Authorization: Bearer ${FLOWBOT_WEBHOOK_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"message\": \"<< parameters.message >>\", \"source\": \"circleci\"}"

jobs:
  build_and_push:
    executor: docker-dind
    steps:
      - checkout

      # Pull last build’s cache (ignore if it does not exist)
      - run:
          name: Pre-pull cache image
          command: |
            docker pull "docker.io/$DOCKERHUB_USER/comfyui-sdxl-template:buildcache" || true

      - run:
          name: Log in to Docker Hub
          command: |
            echo "$DOCKERHUB_PAT" | docker login -u "$DOCKERHUB_USER" --password-stdin

      - notify-flowbot:
          message: "A Docker build for comfyui-sdxl-template has started."

      - run:
          name: Build & push with cache
          command: |
            TAG="${CIRCLE_TAG:-latest}"
            IMG="docker.io/$DOCKERHUB_USER/comfyui-sdxl-template"

            docker build \
              --progress=plain \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              --cache-from "${IMG}:buildcache" \
              -t "${IMG}:${TAG}" .

            docker push "${IMG}:${TAG}"

            # refresh the cache tag for next build
            docker tag "${IMG}:${TAG}" "${IMG}:buildcache"
            docker push "${IMG}:buildcache"
            touch /tmp/build_success

      - run:
          name: Notify FlowBot — build complete
          when: always
          command: |
            TAG="${CIRCLE_TAG:-latest}"
            if [ -z "$FLOWBOT_WEBHOOK_URL" ] || [ -z "$FLOWBOT_WEBHOOK_TOKEN" ]; then
              echo "Missing webhook env vars, skipping notification."
              exit 0
            fi
            if [ -f /tmp/build_success ]; then
              MSG="Docker build for comfyui-sdxl-template:${TAG} completed and pushed to Docker Hub."
            else
              MSG="Docker build for comfyui-sdxl-template:${TAG} failed."
            fi
            curl -s -X POST "${FLOWBOT_WEBHOOK_URL}/hooks/agent" \
              -H "Authorization: Bearer ${FLOWBOT_WEBHOOK_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"message\": \"${MSG}\", \"source\": \"circleci\"}"

workflows:
  version: 2
  build_on_tag:
    jobs:
      - build_and_push:
          context:
            - docker-hub
            - flowbot-webhook-token
          filters:
            tags:
              only: /^v[0-9]+(\.[0-9]+)*$/   # run on tags like v5 or v1.2.3
            branches:
              ignore: /.*/